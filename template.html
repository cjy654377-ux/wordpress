<style>
.rk-post{font-family:'Noto Sans KR',sans-serif;max-width:800px;margin:0 auto;line-height:1.8;color:#333}
.rk-post h2{color:#2d3436;margin-top:30px}
.rk-hl{background:#ffeaa7;padding:15px 20px;border-radius:10px;margin:20px 0}
.rk-tbl{width:100%;border-collapse:collapse;margin:15px 0}
.rk-tbl th,.rk-tbl td{border:1px solid #ddd;padding:10px;text-align:left}
.rk-tbl th{background:#d63031;color:#fff}
@media(max-width:600px){.rk-tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:15px -10px;padding:0 10px}.rk-tbl{min-width:480px}.rk-tbl th,.rk-tbl td{padding:8px 6px;font-size:14px;white-space:nowrap}.rk-tbl td:nth-child(2),.rk-tbl td:nth-child(3){white-space:normal}}
.rk-info{background:#f8f9fa;border-left:4px solid #d63031;padding:15px;margin:20px 0}
.rk-tag{display:inline-block;background:#74b9ff;color:#fff;padding:3px 10px;border-radius:15px;margin:3px;font-size:13px}
.rk-cta{background:#d63031;color:#fff;padding:15px;text-align:center;border-radius:10px;margin:30px 0;font-size:18px}
.rk-quote{background:#f1f2f6;padding:15px;border-radius:10px;border-left:4px solid #d63031}
</style>
<div class="rk-post">
{CONTENT}
</div>
